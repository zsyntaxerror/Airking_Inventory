<!DOCTYPE html>
<html>
<head>
    <title>AirKing - Inventory Management</title>
    <link rel="stylesheet" href="../css/dashboard_air.css">
    <link rel="stylesheet" href="../css/inventory_management.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="../../images/air.png" alt="AirKing Logo">
            <h3>AirKing</h3>
        </div>
        <nav class="nav-menu" id="navMenu"></nav>
        <div class="sidebar-footer">
            <p>AirKing Admin Dashboard</p>
            <p>© 2025 All Rights Reserved</p>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search items by name or SKU...">
                <button id="searchBtn">Search</button>
            </div>
            <div class="header-right" id="headerRight"></div>
        </header>
        
        <!-- Page Title -->
        <div class="page-title">
            <h1>Inventory Management</h1>
            <button class="btn-primary" id="addInventoryBtn">+ Add New Item</button>
        </div>
        
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-item">
                <label>Category:</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Appliances">Appliances</option>
                    <option value="Accessories">Accessories</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Warehouse:</label>
                <select id="warehouseFilter">
                    <option value="">All Warehouses</option>
                    <option value="Main Warehouse CDO">Main Warehouse CDO</option>
                    <option value="CDO Storage Facility">CDO Storage Facility</option>
                    <option value="Davao Main Warehouse">Davao Main Warehouse</option>
                    <option value="Tagum Warehouse">Tagum Warehouse</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Status:</label>
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="In Stock">In Stock</option>
                    <option value="Low Stock">Low Stock</option>
                    <option value="Out of Stock">Out of Stock</option>
                </select>
            </div>
            <button class="btn-secondary" id="resetFilter">Reset Filter</button>
        </div>
        
        <!-- Statistics Cards -->
        <div class="stats-container" id="inventoryStats"></div>
        
        <!-- Inventory Table -->
        <div class="table-section">
            <div class="table-header">
                <h3>Inventory List</h3>
                <div class="table-actions">
                    <button class="btn-export" id="exportBtn">Export</button>
                    <button class="btn-print" id="printBtn">Print</button>
                </div>
            </div>
            <table class="data-table">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    
    <!-- Add/Edit Inventory Modal -->
    <div class="modal" id="inventoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Item</h2>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="inventoryForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Item Name *</label>
                        <input type="text" id="itemName" required>
                    </div>
                    <div class="form-group">
                        <label>SKU *</label>
                        <input type="text" id="sku" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Appliances">Appliances</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Supplier</label>
                        <input type="text" id="supplier">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="description">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Unit Price *</label>
                        <input type="number" id="unitPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Quantity in Stock *</label>
                        <input type="number" id="quantity" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Reorder Level</label>
                        <input type="number" id="reorderLevel">
                    </div>
                    <div class="form-group">
                        <label>Warehouse Location *</label>
                        <select id="warehouseLocation" required>
                            <option value="">Select Warehouse</option>
                            <option value="Main Warehouse CDO">Main Warehouse CDO</option>
                            <option value="CDO Storage Facility">CDO Storage Facility</option>
                            <option value="Davao Main Warehouse">Davao Main Warehouse</option>
                            <option value="Tagum Warehouse">Tagum Warehouse</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Status *</label>
                    <select id="status" required>
                        <option value="In Stock">In Stock</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-save">Save Item</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/inventory_management.js"></script>
</body>
</html>
