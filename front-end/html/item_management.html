<!DOCTYPE html>
<html>
<head>
    <title>AirKing - Item Management</title>
    <link rel="stylesheet" href="../../frontend/css/dashboard_air.css">
    <link rel="stylesheet" href="../../frontend/css/item_management.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="../../images/air.png" alt="AirKing Logo">
            <h3>AirKing</h3>
        </div>
        <nav class="nav-menu" id="navMenu"></nav>
        <div class="sidebar-footer">
            <p>AirKing Admin Dashboard</p>
            <p>© 2025 All Rights Reserved</p>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search items...">
                <button id="searchBtn">Search</button>
            </div>
            <div class="header-right" id="headerRight"></div>
        </header>
        
        <!-- Page Title -->
        <div class="page-title">
            <h1>Item Management</h1>
            <button class="btn-primary" id="addItemBtn">+ Add New Item</button>
        </div>
        
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-item">
                <label>Category:</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Air Conditioner Units">Air Conditioner Units</option>
                    <option value="Compressors">Compressors</option>
                    <option value="Filters">Filters</option>
                    <option value="Coils">Coils</option>
                    <option value="Motors">Motors</option>
                    <option value="Controls">Controls</option>
                    <option value="Accessories">Accessories</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Brand:</label>
                <select id="brandFilter">
                    <option value="">All Brands</option>
                    <option value="TCL">TCL</option>
                    <option value="Samsung">Samsung</option>
                    <option value="Haier">Haier</option>
                    <option value="CHiQ">CHiQ</option>
                    <option value="LG">LG</option>
                    <option value="Koppel">Koppel</option>
                    <option value="Carrier">Carrier</option>
                    <option value="Midea">Midea</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Status:</label>
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <button class="btn-secondary" id="resetFilter">Reset Filter</button>
        </div>
        
        <!-- Statistics Cards -->
        <div class="stats-container" id="itemStats"></div>
        
        <!-- Items Table -->
        <div class="table-section">
            <div class="table-header">
                <h3>Item List</h3>
                <div class="table-actions">
                    <button class="btn-export" id="exportBtn">Export</button>
                    <button class="btn-print" id="printBtn">Print</button>
                </div>
            </div>
            <table class="data-table">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    
    <!-- Add/Edit Item Modal -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Item</h2>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="itemForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Item Name *</label>
                        <input type="text" id="itemName" required>
                    </div>
                    <div class="form-group">
                        <label>Item Code/SKU *</label>
                        <input type="text" id="itemCode" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Air Conditioner Units">Air Conditioner Units</option>
                            <option value="Compressors">Compressors</option>
                            <option value="Filters">Filters</option>
                            <option value="Coils">Coils</option>
                            <option value="Motors">Motors</option>
                            <option value="Controls">Controls</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Brand *</label>
                        <select id="brand" required>
                            <option value="">Select Brand</option>
                            <option value="TCL">TCL</option>
                            <option value="Samsung">Samsung</option>
                            <option value="Haier">Haier</option>
                            <option value="CHiQ">CHiQ</option>
                            <option value="LG">LG</option>
                            <option value="Koppel">Koppel</option>
                            <option value="Carrier">Carrier</option>
                            <option value="Midea">Midea</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Unit Price (₱) *</label>
                        <input type="number" id="unitPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Unit of Measure *</label>
                        <select id="unit" required>
                            <option value="">Select Unit</option>
                            <option value="Piece">Piece</option>
                            <option value="Set">Set</option>
                            <option value="Box">Box</option>
                            <option value="Unit">Unit</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Reorder Level *</label>
                        <input type="number" id="reorderLevel" required>
                    </div>
                    <div class="form-group">
                        <label>Supplier</label>
                        <input type="text" id="supplier">
                    </div>
                </div>
                <div class="form-group">
                    <label>Status *</label>
                    <select id="status" required>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-save">Save Item</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../frontend/js/item_management.js"></script>
</body>
</html>
