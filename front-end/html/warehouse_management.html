<!DOCTYPE html>
<html>
<head>
    <title>AirKing - Warehouse Management</title>
    <link rel="stylesheet" href="../../frontend/css/dashboard_air.css">
    <link rel="stylesheet" href="../../frontend/css/warehouse_management.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="../../images/air.png" alt="AirKing Logo">
            <h3>AirKing</h3>
        </div>
        <nav class="nav-menu" id="navMenu"></nav>
        <div class="sidebar-footer">
            <p>AirKing Admin Dashboard</p>
            <p>© 2025 All Rights Reserved</p>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search warehouses...">
                <button id="searchBtn">Search</button>
            </div>
            <div class="header-right" id="headerRight"></div>
        </header>
        
        <!-- Page Title -->
        <div class="page-title">
            <h1>Warehouse Management</h1>
            <button class="btn-primary" id="addWarehouseBtn">+ Add New Warehouse</button>
        </div>
        
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-item">
                <label>Branch:</label>
                <select id="branchFilter">
                    <option value="">All Branches</option>
                    <option value="Main Branch">Main Branch</option>
                    <option value="CDO Branch">CDO Branch</option>
                    <option value="Davao Branch">Davao Branch</option>
                    <option value="Tagum Branch">Tagum Branch</option>
                    <option value="Butuan Branch">Butuan Branch</option>
                    <option value="Pagadian Branch">Pagadian Branch</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Type:</label>
                <select id="typeFilter">
                    <option value="">All Types</option>
                    <option value="Main Warehouse">Main Warehouse</option>
                    <option value="Storage Warehouse">Storage Warehouse</option>
                    <option value="Distribution Center">Distribution Center</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Status:</label>
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <button class="btn-secondary" id="resetFilter">Reset Filter</button>
        </div>
        
        <!-- Statistics Cards -->
        <div class="stats-container" id="warehouseStats"></div>
        
        <!-- Warehouses Table -->
        <div class="table-section">
            <div class="table-header">
                <h3>Warehouse List</h3>
                <div class="table-actions">
                    <button class="btn-export" id="exportBtn">Export</button>
                    <button class="btn-print" id="printBtn">Print</button>
                </div>
            </div>
            <table class="data-table">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    
    <!-- Add/Edit Warehouse Modal -->
    <div class="modal" id="warehouseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Warehouse</h2>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="warehouseForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Warehouse Name *</label>
                        <input type="text" id="warehouseName" required>
                    </div>
                    <div class="form-group">
                        <label>Warehouse Code *</label>
                        <input type="text" id="warehouseCode" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Branch *</label>
                        <select id="branch" required>
                            <option value="">Select Branch</option>
                            <option value="Main Branch">Main Branch</option>
                            <option value="CDO Branch">CDO Branch</option>
                            <option value="Davao Branch">Davao Branch</option>
                            <option value="Tagum Branch">Tagum Branch</option>
                            <option value="Butuan Branch">Butuan Branch</option>
                            <option value="Pagadian Branch">Pagadian Branch</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Type *</label>
                        <select id="type" required>
                            <option value="">Select Type</option>
                            <option value="Main Warehouse">Main Warehouse</option>
                            <option value="Storage Warehouse">Storage Warehouse</option>
                            <option value="Distribution Center">Distribution Center</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Location/Address *</label>
                    <input type="text" id="location" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Capacity (sq.m.) *</label>
                        <input type="number" id="capacity" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="text" id="contactNumber">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Manager/Supervisor</label>
                        <input type="text" id="manager">
                    </div>
                    <div class="form-group">
                        <label>Opening Date</label>
                        <input type="date" id="openingDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>Status *</label>
                    <select id="status" required>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-save">Save Warehouse</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/warehouse_management.js"></script>
</body>
</html>
