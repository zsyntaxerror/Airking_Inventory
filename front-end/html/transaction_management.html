<!DOCTYPE html>
<html>
<head>
    <title>AirKing - Transaction Management</title>
    <link rel="stylesheet" href="../../frontend/css/dashboard_air.css">
    <link rel="stylesheet" href="../../frontend/css/transaction_management.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="../../images/air.png" alt="AirKing Logo">
            <h3>AirKing</h3>
        </div>
        <nav class="nav-menu" id="navMenu"></nav>
        <div class="sidebar-footer">
            <p>AirKing Admin Dashboard</p>
            <p>© 2025 All Rights Reserved</p>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by Transaction ID or Item Name...">
                <button id="searchBtn">Search</button>
            </div>
            <div class="header-right" id="headerRight"></div>
        </header>
        
        <!-- Page Title -->
        <div class="page-title">
            <h1>Transaction Management</h1>
            <button class="btn-primary" id="addTransactionBtn">+ Add New Transaction</button>
        </div>
        
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-item">
                <label>Transaction Type:</label>
                <select id="typeFilter">
                    <option value="">All Types</option>
                    <option value="Sale">Sale</option>
                    <option value="Purchase">Purchase</option>
                    <option value="Transfer">Transfer</option>
                    <option value="Restock">Restock</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Status:</label>
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="Completed">Completed</option>
                    <option value="Pending">Pending</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
            </div>
             <div class="filter-item">
                <label>Date From:</label>
                <input type="date" id="dateFromFilter">
            </div>
            <div class="filter-item">
                <label>Date To:</label>
                <input type="date" id="dateToFilter">
            </div>
            <button class="btn-secondary" id="resetFilter">Reset Filter</button>
        </div>
        
        <!-- Statistics Cards -->
        <div class="stats-container" id="transactionStats"></div>
        
        <!-- Transactions Table -->
        <div class="table-section">
            <div class="table-header">
                <h3>Transaction List</h3>
                <div class="table-actions">
                    <button class="btn-export" id="exportBtn">Export</button>
                    <button class="btn-print" id="printBtn">Print</button>
                </div>
            </div>
            <table class="data-table">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    
    <!-- Add/Edit Transaction Modal -->
    <div class="modal" id="transactionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Transaction</h2>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="transactionForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Transaction ID</label>
                        <input type="text" id="transactionId" readonly>
                    </div>
                    <div class="form-group">
                        <label>Date *</label>
                        <input type="date" id="transactionDate" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Type *</label>
                        <select id="type" required>
                            <option value="">Select Type</option>
                            <option value="Sale">Sale</option>
                            <option value="Purchase">Purchase</option>
                            <option value="Transfer">Transfer</option>
                            <option value="Restock">Restock</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status *</label>
                        <select id="status" required>
                            <option value="Completed">Completed</option>
                            <option value="Pending">Pending</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Item Name / SKU *</label>
                    <input type="text" id="itemName" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Quantity *</label>
                        <input type="number" id="quantity" required>
                    </div>
                    <div class="form-group">
                        <label>Unit Price (₱) *</label>
                        <input type="number" id="unitPrice" step="0.01" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Total Amount (₱)</label>
                    <input type="number" id="totalAmount" step="0.01" readonly>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-save">Save Transaction</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/transaction_management.js"></script>
</body>
</html>
