<!DOCTYPE html>
<html>
<head>
    <title>AirKing - User Management</title>
    <link rel="stylesheet" href="../../frontend/css/dashboard_air.css">
    <link rel="stylesheet" href="../../frontend/css/user_management.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="../../images/air.png" alt="AirKing Logo">
            <h3>AirKing</h3>
        </div>
        <nav class="nav-menu" id="navMenu"></nav>
        <div class="sidebar-footer">
            <p>AirKing Admin Dashboard</p>
            <p>© 2025 All Rights Reserved</p>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search users...">
                <button id="searchBtn">Search</button>
            </div>
            <div class="header-right" id="headerRight"></div>
        </header>
        
        <!-- Page Title -->
        <div class="page-title">
            <h1>User Management</h1>
            <button class="btn-primary" id="addUserBtn">+ Add New User</button>
        </div>
        
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-item">
                <label>Role:</label>
                <select id="roleFilter">
                    <option value="">All Roles</option>
                    <option value="System Admin">System Admin</option>
                    <option value="Inventory Analyst">Inventory Analyst</option>
                    <option value="Branch Manager">Branch Manager</option>
                    <option value="Warehouse Personnel">Warehouse Personnel</option>
                    <option value="Auditor">Auditor</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Status:</label>
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Branch:</label>
                <select id="branchFilter">
                    <option value="">All Branches</option>
                    <option value="Main Branch">Main Branch</option>
                    <option value="CDO Branch">CDO Branch</option>
                    <option value="Davao Branch">Davao Branch</option>
                </select>
            </div>
            <button class="btn-secondary" id="resetFilter">Reset Filter</button>
        </div>
        
        <!-- Users Table -->
        <div class="table-section">
            <div class="table-header">
                <h3>User List</h3>
                <div class="table-actions">
                    <button class="btn-export" id="exportBtn">Export</button>
                    <button class="btn-print" id="printBtn">Print</button>
                </div>
            </div>
            <table class="data-table">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    
    <!-- Add/Edit User Modal -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New User</h2>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="userForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name *</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" id="username" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="phone">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Role *</label>
                        <select id="role" required>
                            <option value="">Select Role</option>
                            <option value="System Admin">System Admin</option>
                            <option value="Inventory Analyst">Inventory Analyst</option>
                            <option value="Branch Manager">Branch Manager</option>
                            <option value="Warehouse Personnel">Warehouse Personnel</option>
                            <option value="Auditor">Auditor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Branch *</label>
                        <select id="branch" required>
                            <option value="">Select Branch</option>
                            <option value="Main Branch">Main Branch</option>
                            <option value="CDO Branch">CDO Branch</option>
                            <option value="Davao Branch">Davao Branch</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Status *</label>
                    <select id="status" required>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-save">Save User</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/user_management.js"></script>
</body>
</html>
