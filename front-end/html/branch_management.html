<!DOCTYPE html>
<html>
<head>
    <title>AirKing - Branch Management</title>
    <link rel="stylesheet" href="../css/dashboard_air.css">
    <link rel="stylesheet" href="../css/branch_management.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="../../images/air.png" alt="AirKing Logo">
            <h3>AirKing</h3>
        </div>
        <nav class="nav-menu" id="navMenu"></nav>
        <div class="sidebar-footer">
            <p>AirKing Admin Dashboard</p>
            <p>© 2025 All Rights Reserved</p>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search branches...">
                <button id="searchBtn">Search</button>
            </div>
            <div class="header-right" id="headerRight"></div>
        </header>
        
        <!-- Page Title -->
        <div class="page-title">
            <h1>Branch Management</h1>
            <button class="btn-primary" id="addBranchBtn">+ Add New Branch</button>
        </div>
        
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-item">
                <label>Status:</label>
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Region:</label>
                <select id="regionFilter">
                    <option value="">All Regions</option>
                    <option value="Mindanao">Mindanao</option>
                    <option value="Visayas">Visayas</option>
                    <option value="Luzon">Luzon</option>
                </select>
            </div>
            <button class="btn-secondary" id="resetFilter">Reset Filter</button>
        </div>
        
        <!-- Statistics Cards -->
        <div class="stats-container" id="branchStats"></div>
        
        <!-- Branches Table -->
        <div class="table-section">
            <div class="table-header">
                <h3>Branch List</h3>
                <div class="table-actions">
                    <button class="btn-export" id="exportBtn">Export</button>
                    <button class="btn-print" id="printBtn">Print</button>
                </div>
            </div>
            <table class="data-table">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
    
    <!-- Add/Edit Branch Modal -->
    <div class="modal" id="branchModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Branch</h2>
                <span class="close" id="closeModal">&times;</span>
            </div>
            <form id="branchForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Branch Name *</label>
                        <input type="text" id="branchName" required>
                    </div>
                    <div class="form-group">
                        <label>Branch Code *</label>
                        <input type="text" id="branchCode" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Region *</label>
                        <select id="region" required>
                            <option value="">Select Region</option>
                            <option value="Mindanao">Mindanao</option>
                            <option value="Visayas">Visayas</option>
                            <option value="Luzon">Luzon</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" id="city" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Address *</label>
                    <input type="text" id="address" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Contact Number *</label>
                        <input type="text" id="contactNumber" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Manager Name</label>
                        <input type="text" id="managerName">
                    </div>
                    <div class="form-group">
                        <label>Opening Date</label>
                        <input type="date" id="openingDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>Status *</label>
                    <select id="status" required>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-save">Save Branch</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/branch_management.js"></script>
</body>
</html>
